base:
  random_state: 42

data:
  base_path: data                       # Directorio base principal                    # Subdirectorio para datos crudos
  processed_folder: processed           # Subdirectorio general para datos procesados
  predictions_output_folder: predictions # NUEVO: Subcarpeta DENTRO de 'processed_folder' para las salidas de predict.py

  sales_file: initial_sales_clean.parquet   # historico de ventas, ubicado en 'base_path/raw_folder/'
  products_file: productos.csv          # archivo de productos, ubicado en 'base_path/raw_folder/'

  output_file: initial_sales_clean.parquet # Salida de una etapa temprana (ej. 'load_data')
                                           # Se guardaría en 'base_path/processed_folder/'
  output_columns: # Columnas para 'initial_sales_clean.parquet'
    - date_sale
    - id_client
    - product
    - invoice_value_with_discount_and_without_iva
    - amount

  months_to_fetch: 6  # Parámetro general de cuántos datos cargar para el modelo predictivo
  last_month_with_sale: 3 # Usado para definir el conjunto de entrenamiento/backtesting en el modelo de predicción

load_data: # Etapa DVC 'load'
  sales_dtype:
    id_client: str
    product: str
  output_columns: # Columnas para la salida de esta etapa DVC (ej. initial_sales_clean.parquet)
    - date_sale
    - id_client
    - product
    - invoice_value_with_discount_and_without_iva
    - amount
  output_file: initial_sales_clean.parquet

preprocess: # Etapa DVC 'preprocess' (Para el modelo de predicción de compra)
  min_purchase_count: 10
  max_median_days_between: 35
  max_std_days_between: 3
  min_purchase_days_filter: 10
  min_products_filter: 5
  daily_output_file: daily.parquet # Se guardaría en 'base_path/processed_folder/'
  recommendation_output_file: filtered_agg_sales_for_rec.parquet # Se guardaría en 'base_path/processed_folder/' (para item-item)

featurize: # Etapa DVC 'featurize' (Para el modelo de predicción de compra)
  future_days_offset: 5
  quincena_days: [28, 29, 30, 31, 1, 2, 13, 14, 15, 16]
  recency_fillna_days: 365  # Máximo razonable: 1 año (9999 distorsionaba el scaler)
  rolling_windows: [3, 7, 30]
  monetary_windows: [7, 30]              # Ventanas para avg_amount y avg_skus
  output_file: calendar_features.parquet # Se guardaría en 'base_path/processed_folder/'

train: # Etapa DVC 'train' (Para el modelo de predicción de compra)
  split_days_validation: 30
  features:
    - dow
    - dom
    - month
    - is_weekend
    - is_quincena
    - days_since_last
    - cnt_3d
    - cnt_7d
    - cnt_30d
    - avg_amount_7d
    - avg_amount_30d
    - avg_skus_7d
    - avg_skus_30d
  target: purchased
  model_type: hist_gradient_boosting  # opciones: logistic_regression, hist_gradient_boosting
  logistic_regression:
    solver: saga
    max_iter: 100
    tol: 0.001
    C: 1.0
    class_weight: balanced
  hist_gradient_boosting:
    max_iter: 200
    max_depth: 6
    learning_rate: 0.1
    min_samples_leaf: 50
    l2_regularization: 0.1

model: # Parámetros relacionados al modelo de predicción DVC
  model_dir: models # Relativo a la raíz del proyecto, o base_path si se prefiere
  model_name: model.joblib
  calibrated_model_name: calibrated_model.joblib

evaluate: # Etapa DVC 'evaluate' (Para el modelo de predicción de compra)
  calibration_method: sigmoid
  calibration_bins: 10
  evaluation_threshold: 0.50
  shap_sample_size: 1000

backtesting: # Etapa DVC 'backtest' (Para el modelo de predicción de compra)
  backtest_days: 7  # Número de días recientes a evaluar (calculados desde ayer hacia atrás)

# --- Sección para el Recomendador Item-Item (Scripts Manuales) ---
recommendations_item_item:
  num_recommendations: 5
  excluded_product_descriptions:
    - 'BOLSA PLASTICA'
    - 'BOLSA RECUPERADA'
    - 'MENU EMPLEADOS EURO'
  # Carpeta de salida para recomendaciones, relativa a 'base_path/processed_folder/'
  output_folder: recommendations
  # Carpeta para artefactos del modelo, relativa a la raíz o 'base_path'
  model_folder: recommendation_model_item_item
  # Archivo de entrada, nombre de archivo. Se buscará en 'base_path/processed_folder/'
  transaction_data_processed_file: filtered_agg_sales_for_rec.parquet
  similarity_matrix_file: item_similarity.npz  # Se guardaría en 'model_folder'
  mappings_file: mappings.pkl                  # Se guardaría en 'model_folder'
  user_item_matrix_file: sparse_user_item.npz  # Se guardaría en 'model_folder'
  # Archivo de recomendaciones precalculadas, nombre de archivo.
  # Se guardaría en 'base_path/processed_folder/output_folder/'
  precomputed_recs_file: precomputed_item_item_recs.parquet

# --- Sección para el Recomendador por Clustering (Adaptado del Notebook) ---
recommendations_clustering:
  # --- Archivos de Entrada ---
  # ventas_file: se toma de 'data.sales_file'
  # products_file: se toma de 'data.products_file'

  # --- Parámetros de Preprocesamiento y Filtrado para Clustering ---
  months_recent_activity: 1
  min_purchase_days_pattern: 10
  max_median_days_pattern: 35
  max_std_days_pattern: 3

  # --- Parámetros de Clustering ---
  # random_state_kmeans: se toma de 'base.random_state'
  n_clusters: 5         # 5 perfiles: ballena, cotidiano, mensual, hormiga, esporádico
  k_min: 4              # rango para auto-selección (solo si n_clusters es null)
  k_max: 7
  features_for_clustering:
    - tickets_per_month      # frecuencia mensual (tickets/mes)
    - ticket_median          # valor mediano del ticket (COP)
    - months_active_ratio    # regularidad (fracción de meses con compra)
  excluded_product_descriptions:
    - 'BOLSA PLASTICA'
    - 'BOLSA RECUPERADA'
    - 'MENU EMPLEADOS EURO'
  # --- Archivos de Salida para Recomendaciones por Clustering ---
  output_folder: recommendations
  precomputed_cluster_recs_file: precomputed_cluster_recs.parquet

recommendation_settings:
  top_product_percentile: 0.75  # Fracción de productos a mantener por cliente (0.75 = top 75%)

reports: # Salidas de etapas DVC 'evaluate' y 'backtest' (del modelo de predicción)
  reports_dir: reports
  metrics_file: metrics.json
  base_class_report_file: classification_report_base.txt
  calibrated_class_report_file: classification_report_calibrated.txt
  plots_dir: plots
  calibration_plot: calibration_curve.png
  importance_plot: feature_importance.png
  shap_summary_plot: shap_summary.png
  backtesting_metrics_file: backtesting_metrics.csv